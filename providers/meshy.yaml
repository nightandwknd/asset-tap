# Meshy AI Provider Configuration
# Native Meshy API — text-to-image and image-to-3D
# Exists so users can run the full pipeline with only a Meshy key
# (no fal.ai key required).

# YAML anchors for reusable configuration blocks
x-meshy-auth: &meshy-auth
  Authorization: 'Bearer ${MESHY_API_KEY}'

x-meshy-request-headers: &meshy-request-headers
  <<: *meshy-auth
  Content-Type: 'application/json'

# Meshy returns {"result": "<task-id>"} on task creation and requires polling a
# separate URL built from the task id. status_url_template does that substitution.
x-meshy-t2i-polling: &meshy-t2i-polling
  status_field: 'result'
  status_url_template: '/openapi/v1/text-to-image/${result}'
  status_check_field: 'status'
  success_value: 'SUCCEEDED'
  failure_value: 'FAILED'
  result_field: 'image_urls[0]'
  interval_ms: 1500
  max_attempts: 120
  # Meshy cancels via DELETE on the same task URL (no URL rewrite needed).
  cancel_url_template: '${status_url}'
  cancel_method: DELETE

x-meshy-i23d-polling: &meshy-i23d-polling
  status_field: 'result'
  status_url_template: '/openapi/v1/image-to-3d/${result}'
  status_check_field: 'status'
  success_value: 'SUCCEEDED'
  failure_value: 'FAILED'
  result_field: 'model_urls.glb'
  interval_ms: 2000
  max_attempts: 300
  cancel_url_template: '${status_url}'
  cancel_method: DELETE

# Shared parameter lists. YAML anchor+alias replaces the whole list, which is
# exactly what we want here — every model in a family exposes the same knobs.
x-meshy-t2i-params: &meshy-t2i-params
  - name: 'aspect_ratio'
    label: 'Aspect Ratio'
    description: 'Output image aspect ratio. Ignored when Multi-View is enabled.'
    type: select
    default: '1:1'
    options: ['1:1', '16:9', '9:16', '4:3', '3:4']
  - name: 'generate_multi_view'
    label: 'Multi-View'
    description: 'Generate 3 views of the subject instead of 1. Improves image-to-3D quality for some subjects.'
    type: boolean
    default: false
  - name: 'pose_mode'
    label: 'Pose'
    description: 'Force a standard character pose. Leave blank for automatic.'
    type: select
    default: ''
    options: ['', 'a-pose', 't-pose']

# NOTE: meshy-6 and meshy-5 share the same 9-param image-to-3D surface,
# but YAML sequences can't be extended via merge keys, so the two lists
# below (under `parameters:` in each model block) are intentionally
# duplicated. Keep them in sync. Only delta:
#   should_remesh default: false on meshy-6 (native clean topology),
#                           true on meshy-5 (needs the remesh pass).
# The param surface is also kept aligned with fal's fal-ai/meshy/v6/image-to-3d
# so users see the same knobs regardless of which provider serves the model.

# Shared image-to-3D request body. Per-version overrides (e.g. should_remesh)
# go on each model block below.
x-meshy-i23d-body: &meshy-i23d-body
  image_url: '${image_url}'
  topology: 'triangle'
  target_polycount: 30000
  enable_pbr: false
  should_texture: true
  symmetry_mode: 'auto'
  pose_mode: ''
  texture_prompt: ''
  texture_image_url: ''
  target_formats: ['glb']

provider:
  id: 'meshy'
  name: 'Meshy AI'
  description: 'Native Meshy API — text-to-image and production-grade image-to-3D'
  env_vars:
    - 'MESHY_API_KEY'
  base_url: 'https://api.meshy.ai'
  auth_format: 'Bearer ${MESHY_API_KEY}'
  api_key_url: 'https://www.meshy.ai/settings/api'
  website_url: 'https://www.meshy.ai'
  docs_url: 'https://docs.meshy.ai/en/api/quick-start'
  # Meshy has no file upload endpoint — image-to-3D accepts inline
  # `data:image/png;base64,...` URIs directly. The pipeline falls back to
  # data-URI encoding automatically when `upload` is absent.

# =============================================================================
# Text-to-Image (verified 2026-04-15)
# =============================================================================
text_to_image:
  # --- Nano Banana ---
  # Meshy's standard text-to-image model. Shares naming with fal's nano-banana;
  # Meshy does not publicly document the underlying architecture.
  - id: 'meshy/nano-banana'
    name: 'Nano Banana'
    description: 'Meshy text-to-image — standard quality'
    is_default: true
    endpoint: '/openapi/v1/text-to-image'
    method: POST
    request:
      headers:
        <<: *meshy-request-headers
      body:
        ai_model: 'nano-banana'
        prompt: '${prompt}'
        aspect_ratio: '1:1'
        generate_multi_view: false
        pose_mode: ''
    response:
      response_type: polling
      polling:
        <<: *meshy-t2i-polling
    parameters: *meshy-t2i-params

  # --- Nano Banana Pro ---
  # Higher quality tier with the same parameter surface.
  - id: 'meshy/nano-banana-pro'
    name: 'Nano Banana Pro'
    description: 'Meshy text-to-image — higher quality'
    endpoint: '/openapi/v1/text-to-image'
    method: POST
    request:
      headers:
        <<: *meshy-request-headers
      body:
        ai_model: 'nano-banana-pro'
        prompt: '${prompt}'
        aspect_ratio: '1:1'
        generate_multi_view: false
        pose_mode: ''
    response:
      response_type: polling
      polling:
        <<: *meshy-t2i-polling
    parameters: *meshy-t2i-params

# =============================================================================
# Image-to-3D (verified 2026-04-15)
# =============================================================================
image_to_3d:
  # --- Meshy v6 ---
  # Production-grade 3D models with PBR textures, served directly by Meshy
  # without fal.ai's wrapper markup. Accepts either a public image URL or a
  # `data:image/png;base64,...` data URI (the pipeline auto-uses data URI when
  # the provider has no upload endpoint).
  - id: 'meshy/v6/image-to-3d'
    name: 'Meshy v6'
    description: 'Meshy 6 — production-ready 3D with PBR textures'
    is_default: true
    endpoint: '/openapi/v1/image-to-3d'
    method: POST
    request:
      headers:
        <<: *meshy-request-headers
      body:
        <<: *meshy-i23d-body
        ai_model: 'meshy-6'
        # v6 defaults should_remesh=false (clean topology is native).
        should_remesh: false
    response:
      response_type: polling
      polling:
        <<: *meshy-i23d-polling
    parameters:
      - name: 'topology'
        label: 'Topology'
        description: 'Mesh topology. Quad is cleaner for hard-surface, triangle is default. Only applies when Remesh is on.'
        type: select
        default: 'triangle'
        options: ['triangle', 'quad']
      - name: 'target_polycount'
        label: 'Target Polycount'
        description: 'Target polygon count. Higher = more detail. Hard target only when Remesh is on — otherwise approximate.'
        type: integer
        widget: input
        default: 30000
        min: 100
        max: 300000
      - name: 'should_remesh'
        label: 'Remesh'
        description: 'Run the remesh phase for cleaner topology. Meshy 6 produces clean topology without it, but disabling may result in non-manifold geometry.'
        type: boolean
        default: false
      - name: 'should_texture'
        label: 'Generate Textures'
        description: 'Generate texture maps. Disable for untextured geometry only.'
        type: boolean
        default: true
      - name: 'enable_pbr'
        label: 'PBR Materials'
        description: 'Generate metallic/roughness/normal maps. Ignored when Generate Textures is off. The in-app viewer renders flat textures more reliably; enable PBR if you plan to use the model in Blender/Unity/Unreal.'
        type: boolean
        default: false
      - name: 'texture_prompt'
        label: 'Texture Prompt'
        description: 'Optional text prompt guiding texturing (max 600 chars). Mutually exclusive with Texture Image URL. Costs 10 extra credits per task.'
        type: string
        default: ''
      - name: 'texture_image_url'
        label: 'Texture Image URL'
        description: 'Optional 2D image URL guiding texturing. Mutually exclusive with Texture Prompt.'
        type: string
        default: ''
      - name: 'symmetry_mode'
        label: 'Symmetry'
        description: 'Controls symmetry during generation.'
        type: select
        default: 'auto'
        options: ['off', 'auto', 'on']
      - name: 'pose_mode'
        label: 'Pose'
        description: 'Force a standard character pose. Leave blank for automatic.'
        type: select
        default: ''
        options: ['', 'a-pose', 't-pose']

  # --- Meshy v5 ---
  # Previous-generation model — roughly 4× cheaper on mesh generation
  # (5 credits vs 20) and 2× cheaper fully textured (15 vs 30). Use this to
  # stretch a Meshy subscription's credit pool for drafts or bulk work.
  - id: 'meshy/v5/image-to-3d'
    name: 'Meshy v5'
    description: 'Meshy 5 — previous generation, lower credit cost'
    endpoint: '/openapi/v1/image-to-3d'
    method: POST
    request:
      headers:
        <<: *meshy-request-headers
      body:
        <<: *meshy-i23d-body
        ai_model: 'meshy-5'
        # v5 defaults should_remesh=true (needs the remesh pass for clean topology).
        should_remesh: true
    response:
      response_type: polling
      polling:
        <<: *meshy-i23d-polling
    # NOTE: kept in sync with meshy-6 above. Only delta is should_remesh's default.
    parameters:
      - name: 'topology'
        label: 'Topology'
        description: 'Mesh topology. Quad is cleaner for hard-surface, triangle is default. Only applies when Remesh is on.'
        type: select
        default: 'triangle'
        options: ['triangle', 'quad']
      - name: 'target_polycount'
        label: 'Target Polycount'
        description: 'Target polygon count. Higher = more detail. Hard target only when Remesh is on — otherwise approximate.'
        type: integer
        widget: input
        default: 30000
        min: 100
        max: 300000
      - name: 'should_remesh'
        label: 'Remesh'
        description: 'Run the remesh phase for cleaner topology. Recommended for Meshy 5.'
        type: boolean
        default: true
      - name: 'should_texture'
        label: 'Generate Textures'
        description: 'Generate texture maps. Disable for untextured geometry only.'
        type: boolean
        default: true
      - name: 'enable_pbr'
        label: 'PBR Materials'
        description: 'Generate metallic/roughness/normal maps. Ignored when Generate Textures is off. The in-app viewer renders flat textures more reliably; enable PBR if you plan to use the model in Blender/Unity/Unreal.'
        type: boolean
        default: false
      - name: 'texture_prompt'
        label: 'Texture Prompt'
        description: 'Optional text prompt guiding texturing (max 600 chars). Mutually exclusive with Texture Image URL. Costs 10 extra credits per task.'
        type: string
        default: ''
      - name: 'texture_image_url'
        label: 'Texture Image URL'
        description: 'Optional 2D image URL guiding texturing. Mutually exclusive with Texture Prompt.'
        type: string
        default: ''
      - name: 'symmetry_mode'
        label: 'Symmetry'
        description: 'Controls symmetry during generation.'
        type: select
        default: 'auto'
        options: ['off', 'auto', 'on']
      - name: 'pose_mode'
        label: 'Pose'
        description: 'Force a standard character pose. Leave blank for automatic.'
        type: select
        default: ''
        options: ['', 'a-pose', 't-pose']
