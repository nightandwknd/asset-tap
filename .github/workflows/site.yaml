name: Site

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'site/**'
      - '.github/workflows/site.yaml'

  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  # PR: build preview + auto-cleanup on close
  preview:
    name: Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Zola
        if: github.event.action != 'closed'
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2
      - name: Build site
        if: github.event.action != 'closed'
        run: cd site && zola build --base-url "/pr-preview/pr-${{ github.event.number }}"
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site/public

  # Merge: build and push to gh-pages (GitHub Pages deploys automatically)
  publish:
    name: Publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and push to gh-pages
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          BUILD_DIR: site
          PAGES_BRANCH: gh-pages
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
