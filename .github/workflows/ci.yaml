name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Layer 0: All independent jobs run in parallel ──────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: dprint,editorconfig-checker
      - run: make fmt-check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make check

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-coverage
        with:
          ignore-pattern: gui/
      - name: Test report
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results
          include_passed: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make doc

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  udeps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps
      - run: make udeps

  version-preview:
    name: Version Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/get-version
        id: calver
      - name: Post version summary
        run: |
          echo "## Release Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.calver.outputs.should_release }}" = "true" ]; then
            echo "Merging this PR will create release **v${{ steps.calver.outputs.new_version }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.calver.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "No release will be created (no new commits since last tag)." >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Layer 1: Build + package all platforms in parallel ─────────────
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: [check]
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-macos-${{ matrix.target }}

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "0.0.0-pr.${{ github.event.pull_request.number }}"/' Cargo.toml

      - name: Build
        run: |
          cargo build --release --package asset-tap     --target ${{ matrix.target }}
          cargo build --release --package asset-tap-gui --target ${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}-pr-${{ github.event.pull_request.number }}
          path: |
            target/${{ matrix.target }}/release/asset-tap
            target/${{ matrix.target }}/release/asset-tap-gui
          retention-days: 7

  package-macos:
    name: Package macOS (universal)
    needs: [build-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "0.0.0-pr.${{ github.event.pull_request.number }}"/' Cargo.toml

      - name: Download arch binaries
        uses: actions/download-artifact@v8
        with:
          pattern: macos-*-pr-${{ github.event.pull_request.number }}
          path: arch

      - name: Create universal binaries
        run: |
          mkdir -p target/release
          lipo -create -output target/release/asset-tap \
            arch/macos-aarch64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap \
            arch/macos-x86_64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap
          lipo -create -output target/release/asset-tap-gui \
            arch/macos-aarch64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap-gui \
            arch/macos-x86_64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap-gui
          chmod +x target/release/asset-tap target/release/asset-tap-gui
          codesign --sign - --force target/release/asset-tap target/release/asset-tap-gui
          file target/release/asset-tap
          file target/release/asset-tap-gui
          rm -rf arch

      - name: Package .app and DMG
        run: |
          (cd gui && cargo packager --release --formats app)
          ./scripts/package-macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: asset-tap-macos-pr-${{ github.event.pull_request.number }}
          path: target/release/AssetTap.dmg
          if-no-files-found: error

  build-linux:
    name: Build & Package (Linux)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: linux
          version: '0.0.0-pr.${{ github.event.pull_request.number }}'
          artifact-suffix: '-pr-${{ github.event.pull_request.number }}'
          upload-binaries: 'true'

  build-windows:
    name: Build & Package (Windows)
    needs: [check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: windows
          version: '0.0.0-pr.${{ github.event.pull_request.number }}'
          artifact-suffix: '-pr-${{ github.event.pull_request.number }}'

  # ─── Layer 2: CLI tests (consumes Linux binary) ────────────────────
  cli-test:
    name: CLI Tests
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: asset-tap-binaries-linux-pr-${{ github.event.pull_request.number }}
          path: target/release
      - name: Make CLI executable
        run: chmod +x target/release/asset-tap
      - name: Run comprehensive CLI tests
        run: ./scripts/test_cli.sh
