name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Detect what changed to skip irrelevant jobs ─────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'core/**'
              - 'cli/**'
              - 'gui/**'
              - 'providers/**'
              - 'templates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - '.cargo/**'
              - '.config/**'
              - 'scripts/**'
              - '.github/actions/**'
              - '.github/workflows/ci.yaml'
              - 'rust-toolchain.toml'

  # ─── Layer 0: All independent jobs run in parallel ──────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: dprint,editorconfig-checker
      - run: make fmt-check

  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          # Pin the download script to the v1.7.12 release commit so the script
          # and the binary it fetches can't drift independently from each other.
          mkdir -p "$HOME/.local/bin"
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash) 1.7.12 "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: make lint-workflows

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: shellcheck
      - run: make lint-shell

  clippy:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy

  check:
    name: Check
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: make check

  test:
    name: Test & Coverage
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-coverage
        with:
          ignore-pattern: gui/
      - name: Test report
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results
          include_passed: true

  docs:
    name: Documentation
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: make doc

  audit:
    name: Security Audit
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  udeps:
    name: Unused Dependencies
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps
      - run: make udeps

  version-preview:
    name: Version Preview
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/get-version
        id: calver
      - name: Post version summary
        run: |
          {
            echo "## Release Preview"
            echo ""
            if [ "${{ steps.calver.outputs.should_release }}" = "true" ]; then
              echo "Merging this PR will create release **v${{ steps.calver.outputs.new_version }}**"
              echo ""
              echo "${{ steps.calver.outputs.changelog }}"
            else
              echo "No release will be created (no new commits since last tag)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Layer 1: Build + package all platforms in parallel ─────────────
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: [check]
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-macos-${{ matrix.target }}

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "0.0.0-pr.${{ github.event.pull_request.number }}"/' Cargo.toml

      - name: Build
        run: |
          cargo build --release --features mock --package asset-tap     --target ${{ matrix.target }}
          cargo build --release --features mock --package asset-tap-gui --target ${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}-pr-${{ github.event.pull_request.number }}
          path: |
            target/${{ matrix.target }}/release/asset-tap
            target/${{ matrix.target }}/release/asset-tap-gui
          retention-days: 7

  package-macos:
    name: Package macOS (universal)
    needs: [build-macos]
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "0.0.0-pr.${{ github.event.pull_request.number }}"/' Cargo.toml

      - name: Download arch binaries
        uses: actions/download-artifact@v8
        with:
          pattern: macos-*-pr-${{ github.event.pull_request.number }}
          path: arch

      - name: Create universal binaries
        run: |
          mkdir -p target/release
          lipo -create -output target/release/asset-tap \
            arch/macos-aarch64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap \
            arch/macos-x86_64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap
          lipo -create -output target/release/asset-tap-gui \
            arch/macos-aarch64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap-gui \
            arch/macos-x86_64-apple-darwin-pr-${{ github.event.pull_request.number }}/asset-tap-gui
          chmod +x target/release/asset-tap target/release/asset-tap-gui
          file target/release/asset-tap
          file target/release/asset-tap-gui
          rm -rf arch

      - name: Package .app and DMG
        run: |
          (cd gui && cargo packager --release --formats app)
          ./scripts/package-macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: asset-tap-macos-pr-${{ github.event.pull_request.number }}
          path: target/release/AssetTap.dmg
          if-no-files-found: error
          # PR previews use a short retention; matches the build-and-package
          # composite's `installer-retention-days: '7'` for the other platforms.
          retention-days: 7

  build-linux:
    name: Build & Package (Linux)
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: linux
          version: '0.0.0-pr.${{ github.event.pull_request.number }}'
          artifact-suffix: '-pr-${{ github.event.pull_request.number }}'
          upload-binaries: 'true'
          cargo-flags: '--features mock'
          # PR-preview installers don't need 90 days of retention. Match the
          # binary retention so PR storage costs scale with PR count, not time.
          installer-retention-days: '7'

  build-windows:
    name: Build & Package (Windows)
    needs: [check]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: windows
          version: '0.0.0-pr.${{ github.event.pull_request.number }}'
          artifact-suffix: '-pr-${{ github.event.pull_request.number }}'
          cargo-flags: '--features mock'
          # See build-linux above — PR previews use a short retention.
          installer-retention-days: '7'

  # ─── Layer 2: CLI tests (consumes Linux binary) ────────────────────
  cli-test:
    name: CLI Tests
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: asset-tap-binaries-linux-pr-${{ github.event.pull_request.number }}
          path: target/release
      - name: Make CLI executable
        run: chmod +x target/release/asset-tap
      - name: Run comprehensive CLI tests
        run: ./scripts/test_cli.sh
      # Upload the per-test log dir on failure so we can debug without
      # having to print every command's stdout to the workflow console.
      # The script writes test_results/test_log_<timestamp>.txt with the
      # full captured CLI output for each test, including the corruption
      # warning paths and any pipeline traces.
      - name: Upload test_results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cli-test-results-pr-${{ github.event.pull_request.number }}
          path: test_results/
          if-no-files-found: warn
          retention-days: 7
