name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - '.config/**'
      - '.github/dependabot.yaml'
      - '.github/workflows/site.yaml'
      - '.github/workflows/ci.yaml'
      - '.vscode/**'
      - 'docs/**'
      - 'site/**'
      - '*.md'
      - '.editorconfig'
      - '.editorconfig-checker.json'
      - '.gitattributes'
      - '.gitignore'
      - '.env.example'
      - '.mcp.json'
      - 'cliff.toml'
      - 'dprint.json'
      - 'LICENSE'

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.calver.outputs.new_version }}
      should_release: ${{ steps.calver.outputs.should_release }}
      changelog: ${{ steps.calver.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/get-version
        id: calver

  # ─── macOS: build each arch in parallel, then combine ────────────────
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-${{ matrix.target }}

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "${{ needs.version.outputs.new_version }}"/' Cargo.toml

      - name: Build
        run: |
          cargo build --release --package asset-tap     --target ${{ matrix.target }}
          cargo build --release --package asset-tap-gui --target ${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/asset-tap
            target/${{ matrix.target }}/release/asset-tap-gui
          retention-days: 1

  package-macos:
    name: Package macOS (universal)
    needs: [version, build-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Stamp version
        run: sed -i.bak 's/^version = ".*"/version = "${{ needs.version.outputs.new_version }}"/' Cargo.toml

      - name: Download arch binaries
        uses: actions/download-artifact@v8
        with:
          pattern: macos-*
          path: arch

      - name: Create universal binaries
        run: |
          mkdir -p target/release
          lipo -create -output target/release/asset-tap \
            arch/macos-aarch64-apple-darwin/asset-tap \
            arch/macos-x86_64-apple-darwin/asset-tap
          lipo -create -output target/release/asset-tap-gui \
            arch/macos-aarch64-apple-darwin/asset-tap-gui \
            arch/macos-x86_64-apple-darwin/asset-tap-gui
          chmod +x target/release/asset-tap target/release/asset-tap-gui
          codesign --sign - --force target/release/asset-tap target/release/asset-tap-gui
          file target/release/asset-tap
          file target/release/asset-tap-gui
          rm -rf arch

      - name: Package .app and DMG
        run: |
          (cd gui && cargo packager --release --formats app)
          ./scripts/package-macos.sh

      - name: Create CLI archive
        run: |
          mkdir -p cli-dist
          cp target/release/asset-tap cli-dist/
          (cd cli-dist && tar -czvf ../asset-tap-cli-macos.tar.gz *)
          rm -rf cli-dist

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: asset-tap-macos
          path: target/release/AssetTap.dmg
          if-no-files-found: error

      - name: Upload CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: asset-tap-cli-macos
          path: asset-tap-cli-macos.tar.gz
          if-no-files-found: error

  # ─── Linux & Windows: build + package ────────────────────────────────
  build-linux:
    name: Build & Package (Linux)
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: linux
          version: ${{ needs.version.outputs.new_version }}
          upload-installers: 'true'
          upload-cli-archives: 'true'
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: asset-tap-sbom
          output-file: asset-tap-sbom.cdx.json
          format: cyclonedx-json

  build-windows:
    name: Build & Package (Windows)
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-package
        with:
          platform: windows
          version: ${{ needs.version.outputs.new_version }}
          upload-installers: 'true'
          upload-cli-archives: 'true'

  # ─── Release: commit, tag, and create GitHub Release ─────────────────
  release:
    name: Create Release
    needs: [version, package-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,dprint

      - name: Create release commit and tag
        run: |
          NEW_VERSION="${{ needs.version.outputs.new_version }}"

          # Stamp version into Cargo.toml and update lockfile
          sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" Cargo.toml
          cargo update --workspace

          # Generate full CHANGELOG.md and format to match dprint conventions
          git-cliff --tag "v${NEW_VERSION}" -o CHANGELOG.md
          dprint fmt CHANGELOG.md

          # Create release commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "release: v${NEW_VERSION} [skip ci]"

          # Tag the release commit and push both
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Demo bundle (downloaded on demand by the app)
          # Stamp the generator field to match the release version
          NEW_VERSION="${{ needs.version.outputs.new_version }}"
          sed -i "s|\"generator\":.*|\"generator\": \"asset-tap/${NEW_VERSION}\"|" bundles/asset-tap/bundle.json
          (cd bundles && zip -r ../release/demo-bundle.zip asset-tap/)
          # Generate manifest with version info + SHA-256 for integrity verification
          DEMO_SHA256=$(sha256sum release/demo-bundle.zip | awk '{print $1}')
          jq --arg sha "$DEMO_SHA256" '{demo_version, name, sha256: $sha}' bundles/asset-tap/bundle.json > release/demo-manifest.json

          # macOS
          cp artifacts/asset-tap-macos/AssetTap.dmg release/AssetTap-macos.dmg
          cp artifacts/asset-tap-cli-macos/asset-tap-cli-macos.tar.gz release/

          # Linux
          find artifacts/asset-tap-linux-deb -name '*.deb' -exec cp {} release/asset-tap-linux-amd64.deb \; 2>/dev/null || echo "No .deb found"
          find artifacts/asset-tap-linux-appimage -name '*.AppImage' -exec cp {} release/asset-tap-linux-x86_64.AppImage \; 2>/dev/null || echo "No AppImage found"
          cp artifacts/asset-tap-cli-linux/asset-tap-cli-linux.tar.gz release/

          # Windows
          find artifacts/asset-tap-windows -name '*-setup.exe' -exec cp {} release/asset-tap-windows-setup.exe \; 2>/dev/null || echo "No Windows installer found"
          cp artifacts/asset-tap-cli-windows/asset-tap-cli-windows.zip release/

          # SBOM
          cp artifacts/asset-tap-sbom/asset-tap-sbom release/asset-tap-sbom.cdx.json

          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ needs.version.outputs.changelog }}
        run: |
          printf '%s\n' "$CHANGELOG" > release-notes.md
          gh release create "v${{ needs.version.outputs.new_version }}" \
            --title "v${{ needs.version.outputs.new_version }}" \
            --notes-file release-notes.md \
            release/*
